<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mad Finans Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #11182a;
      font-size: 22px;
      font-weight: bold;
      color: #00d4ff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #11182a;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #1f2a44;
    }

    .price {
      font-size: 24px;
      color: #00d4ff;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>📊 MAD FİNANS DASHBOARD</header>

<div class="grid">
  <div class="card">
    <h3>Bitcoin</h3>
    <div id="btc" class="price">Yükleniyor...</div>
  </div>

  <div class="card">
    <h3>Ethereum</h3>
    <div id="eth" class="price">Yükleniyor...</div>
  </div>

  <div class="card">
    <h3>Solana</h3>
    <div id="sol" class="price">Yükleniyor...</div>
  </div>
</div>

<script>
async function getPrices() {
  const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd");
  const data = await res.json();

  document.getElementById("btc").innerHTML = "$ " + data.bitcoin.usd;
  document.getElementById("eth").innerHTML = "$ " + data.ethereum.usd;
  document.getElementById("sol").innerHTML = "$ " + data.solana.usd;
}

getPrices();
setInterval(getPrices, 10000);
</script>

</body>
</html>
